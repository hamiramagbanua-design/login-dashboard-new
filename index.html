<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSIS-2B Login Dashboard</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
  position:relative;
}

/* Animated glowing circles */

body::before{
  content:'';
  position:absolute;
  width:300px;
  height:300px;
  background:#00f7ff;
  border-radius:50%;
  top:-100px;
  left:-100px;
  filter:blur(120px);
  animation:move1 8s infinite alternate;
}

body::after{
  content:'';
  position:absolute;
  width:350px;
  height:350px;
  background:#8b5cf6;
  border-radius:50%;
  bottom:-120px;
  right:-120px;
  filter:blur(140px);
  animation:move2 10s infinite alternate;
}

@keyframes move1{
  from{
    transform:translate(0,0);
  }
  to{
    transform:translate(80px,60px);
  }
}

@keyframes move2{
  from{
    transform:translate(0,0);
  }
  to{
    transform:translate(-70px,-50px);
  }
}

/* Glassmorphism container */

.container{
  width:370px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  text-align:center;
  color:white;
  z-index:1;
}

h2{
  margin-bottom:20px;
  font-size:30px;
  font-weight:600;
  color:#ffffff;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.12);
  color:white;
  font-size:15px;
}

input::placeholder{
  color:#d1d5db;
}

/* PASSWORD BOX */

.password-box{
  position:relative;
  width:100%;
}

.password-box input{
  width:100%;
  padding-right:45px;
}

.eye{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:#d1d5db;
}

.eye:hover{
  color:#67e8f9;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#06b6d4,#8b5cf6);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px #8b5cf6;
}

a{
  color:#67e8f9;
  cursor:pointer;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:50%;
  border:4px solid #67e8f9;
  margin-bottom:15px;
  box-shadow:0 0 20px #06b6d4;
}

.hidden{
  display:none;
}

p{
  text-align:left;
  margin-top:10px;
  color:#e5e7eb;
}

</style>
</head>

<body>

<!-- REGISTER FORM -->
<div class="container" id="registerPage">

  <h2>Register</h2>

  <input type="text" id="name" placeholder="Full Name">

  <input type="text" id="age" placeholder="Age">

  <input type="text" id="birthdate" placeholder="Birthdate">

  <input type="text" id="course" placeholder="Course & Section">

  <input type="email" id="email" placeholder="Email">

  <input type="text" id="username" placeholder="Username">

  <!-- REGISTER PASSWORD -->
  <div class="password-box">
    <input type="password" id="password" placeholder="Password">
    <span class="eye" onclick="togglePassword('password', this)">👁</span>
  </div>

  <input type="file" id="photo" accept="image/*">

  <button onclick="register()">Register</button>

  <h4>
    Already have an account?
    <a onclick="showLogin()">Login</a>
  </h4>

</div>

<!-- LOGIN FORM -->
<div class="container hidden" id="loginPage">

  <h2>Login</h2>

  <input type="text" id="loginUser" placeholder="Username">

  <!-- LOGIN PASSWORD -->
  <div class="password-box">
    <input type="password" id="loginPass" placeholder="Password">
    <span class="eye" onclick="togglePassword('loginPass', this)">👁</span>
  </div>

  <button onclick="login()">Login</button>

  <h4>
    No account?
    <a onclick="showRegister()">Register</a>
  </h4>

</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboardPage">

  <h2>Dashboard</h2>

  <img id="displayPhoto" src="">

  <p><b>Full Name:</b> <span id="dName"></span></p>

  <p><b>Age:</b> <span id="dAge"></span></p>

  <p><b>Birthdate:</b> <span id="dBirthdate"></span></p>

  <p><b>Course:</b> <span id="dCourse"></span></p>

  <p><b>Email:</b> <span id="dEmail"></span></p>

  <p><b>Username:</b> <span id="dUser"></span></p>

  <button onclick="logout()">Logout</button>

</div>

<script>

function showLogin(){
  document.getElementById("registerPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function showRegister(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("registerPage").classList.remove("hidden");
}

function register(){

  let name = document.getElementById("name").value;
  let age = document.getElementById("age").value;
  let birthdate = document.getElementById("birthdate").value;
  let course = document.getElementById("course").value;
  let email = document.getElementById("email").value;
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;
  let file = document.getElementById("photo").files[0];

  if(
    name === "" ||
    age === "" ||
    birthdate === "" ||
    course === "" ||
    email === "" ||
    username === "" ||
    password === ""
  ){
    alert("Please fill out all fields!");
    return;
  }

  if(!file){
    alert("Please upload a photo!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(){

    let user = {
      name: name,
      age: age,
      birthdate: birthdate,
      course: course,
      email: email,
      username: username,
      password: password,
      photo: reader.result
    };

    localStorage.setItem("user", JSON.stringify(user));

    alert("Registration Successful!");

    showLogin();
  };

  reader.readAsDataURL(file);
}

function login(){

  let username = document.getElementById("loginUser").value;
  let password = document.getElementById("loginPass").value;

  let user = JSON.parse(localStorage.getItem("user"));

  if(user &&
     username === user.username &&
     password === user.password){

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboardPage").classList.remove("hidden");

    document.getElementById("dName").innerHTML = user.name;
    document.getElementById("dAge").innerHTML = user.age;
    document.getElementById("dBirthdate").innerHTML = user.birthdate;
    document.getElementById("dCourse").innerHTML = user.course;
    document.getElementById("dEmail").innerHTML = user.email;
    document.getElementById("dUser").innerHTML = user.username;

    document.getElementById("displayPhoto").src = user.photo;

  } else {
    alert("Invalid Username or Password!");
  }
}

function logout(){

  document.getElementById("dashboardPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");

}

/* SHOW / HIDE PASSWORD */

function togglePassword(id, icon){

  let input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    icon.innerHTML = "🙈";
  } else {
    input.type = "password";
    icon.innerHTML = "👁";
  }

}

</script>

</body>
</html>
